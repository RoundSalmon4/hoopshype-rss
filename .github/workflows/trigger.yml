name: Trigger HoopsHype update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ping]
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: trigger-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/update_feeds.py
        continue-on-error: true
      - run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add rss data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Quick update HoopsHype feeds [skip ci]"
            git push
          fi
