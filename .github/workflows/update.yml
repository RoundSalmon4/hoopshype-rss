name: Update HoopsHype RSS Feeds

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: update-feeds
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/update_feeds.py
        continue-on-error: true
      - run: |
          git config user.name "roundsalmon4"
          git config user.email "209016228+RoundSalmon4@users.noreply.github.com"
          git add rss data/state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update HoopsHype RSS feeds [skip ci]"
            git push
          fi
